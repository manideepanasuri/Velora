appId: com.velora.app
productName: Velora
copyright: "Copyright © 2026 Velora"
directories:
  buildResources: build
files:
  - out
  - build/icon.*
  - package.json
  - resources
asar: true
asarUnpack:
  - resources/**
compression: store
fileAssociations:
  - ext: "pdf"
    name: "PDF Document"
    description: "Open PDF files with Velora"
    role: Viewer
    mimeType: "application/pdf"
win:
  target: 
    - nsis
    - portable
  executableName: velora
  icon: build/icon.ico
nsis:
  artifactName: ${productName}-Windows-${version}-Setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  perMachine: true
portable:
  artifactName: ${productName}-Windows-${version}-Portable.${ext}
mac:
  target: dmg
  icon: build/icon.icns
  category: public.app-category.utilities
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${productName}-macOS-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  maintainer: Velora Team
  category: Utility
appImage:
  artifactName: ${productName}-Linux-${version}.${ext}
npmRebuild: false
publish:
  - provider: github
    releaseType: draft
